name: Deploy Web Demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build web wasm assets
        run: ./web/build-wasm.sh

      - name: Publish line pattern assets
        run: |
          mkdir -p web/assets/line_patterns
          if [ ! -f examples/shared/art/1.bmp ]; then
            unzip -o examples/shared/art/line_patterns.bmp.zip -d examples/shared/art
          fi
          cp -f examples/shared/art/[1-9].bmp web/assets/line_patterns/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
