<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGG Go - Web Demo</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading">Loading WASM...</div>

    <h1>AGG Go Web Demo</h1>

    <div class="controls">
      <label for="demoSelector">Select Demo:</label>
      <select id="demoSelector">
        <option value="agg2d">Agg2D API Demo</option>
        <option value="lion">Lion Demo (AGG Signature)</option>
        <option value="gradients">Gradients Demo</option>
        <option value="aa">Anti-Aliasing Demo (Zoom)</option>
        <option value="blend">Blend Modes Demo</option>
        <option value="bspline">B-Spline Demo</option>
        <option value="dash">Dashed Lines Demo</option>
        <option value="gouraud">Gouraud Shading (Interpolation)</option>
        <option value="imagefilters">Image Interpolation Filters</option>
        <option value="sbool">Boolean Operations (XOR/Union)</option>
        <option value="aatest">Anti-Aliasing Test (Sub-pixel Precision)</option>
        <option value="convstroke">Line Join &amp; Cap Styles</option>
        <option value="convcontour">
          Contour Tool &amp; Polygon Orientation
        </option>
        <option value="gamma">Gamma Correction</option>
        <option value="lionoutline">Lion Outline (Rotate/Scale/Skew)</option>
        <option value="roundedrect">Rounded Rectangle</option>
        <option value="component">Component Rendering (CMY Mixing)</option>
        <option value="alphagrad">Alpha Channel Gradient</option>
        <option value="rasterizers">Aliased vs AA Rasterizer</option>
        <option value="flash_rasterizer">Flash (Compound) Rasterizer</option>
        <option value="perspective">Perspective Transformations</option>
        <option value="bezier_div">Bezier Subdivision</option>
        <option value="gouraud_mesh">Gouraud Mesh (Compound)</option>
        <option value="trans_curve">Along-a-Curve Transformer</option>
        <option value="trans_curve2">Double Path Transformer</option>
        <option value="distortions">Image Distortions</option>
        <option value="trans_polar">Polar Transformations</option>
      </select>
      <button id="renderBtn">Refresh / Reset</button>
    </div>

    <div class="controls" id="aaControls" style="display: none">
      <label for="zoomSlider">Pixel Size:</label>
      <input
        type="range"
        id="zoomSlider"
        min="8"
        max="64"
        value="32"
        step="1"
      />
      <span id="zoomValue">32</span>
    </div>

    <div class="controls" id="dashControls" style="display: none">
      <label for="dashWidthSlider">Line Width:</label>
      <input
        type="range"
        id="dashWidthSlider"
        min="0.5"
        max="10"
        value="3"
        step="0.5"
      />
      <span id="dashWidthValue">3</span>
      <label style="margin-left: 1rem"
        ><input type="checkbox" id="dashClosed" checked /> Closed</label
      >
    </div>

    <div class="controls" id="gouraudControls" style="display: none">
      <label for="dilationSlider">Dilation:</label>
      <input
        type="range"
        id="dilationSlider"
        min="-2"
        max="5"
        value="0.5"
        step="0.1"
      />
      <span id="dilationValue">0.5</span>
    </div>

    <div class="controls" id="imageFilterControls" style="display: none">
      <label for="filterSelector">Filter:</label>
      <select id="filterSelector">
        <option value="0">Bilinear</option>
        <option value="1">Hanning</option>
        <option value="2">Hamming</option>
        <option value="3">Hermite</option>
        <option value="4">Quadric</option>
        <option value="5">Bicubic</option>
        <option value="6">Catrom</option>
        <option value="7">Mitchell</option>
        <option value="8">Spline16</option>
        <option value="9">Spline36</option>
        <option value="10">Gaussian</option>
        <option value="11">Bessel</option>
        <option value="12">Sinc</option>
        <option value="13">Lanczos</option>
        <option value="14">Blackman</option>
      </select>
      <label for="filterRadiusSlider" id="radiusLabel" style="display: none"
        >Radius:</label
      >
      <input
        type="range"
        id="filterRadiusSlider"
        min="2"
        max="8"
        value="4"
        step="0.1"
        style="display: none"
      />
      <span id="filterRadiusValue" style="display: none">4</span>
    </div>

    <div class="controls" id="sboolControls" style="display: none">
      <label for="sboolOpSelector">Operation:</label>
      <select id="sboolOpSelector">
        <option value="0">Union (Non-Zero)</option>
        <option value="2">XOR (Even-Odd)</option>
      </select>
    </div>

    <div class="controls" id="convstrokeControls" style="display: none">
      <label for="strokeJoinSelector">Join:</label>
      <select id="strokeJoinSelector">
        <option value="0">Miter</option>
        <option value="1">Round</option>
        <option value="2">Bevel</option>
      </select>
      <label for="strokeCapSelector">Cap:</label>
      <select id="strokeCapSelector">
        <option value="0">Butt</option>
        <option value="1">Square</option>
        <option value="2">Round</option>
      </select>
      <label for="strokeWidthSlider">Width:</label>
      <input
        type="range"
        id="strokeWidthSlider"
        min="3"
        max="40"
        value="20"
        step="1"
      />
      <span id="strokeWidthValue">20</span>
      <label for="strokeMiterSlider">Miter Limit:</label>
      <input
        type="range"
        id="strokeMiterSlider"
        min="1"
        max="10"
        value="4"
        step="0.5"
      />
      <span id="strokeMiterValue">4</span>
    </div>

    <div class="controls" id="convcontourControls" style="display: none">
      <label for="contourWidthSlider">Width:</label>
      <input
        type="range"
        id="contourWidthSlider"
        min="-60"
        max="60"
        value="0"
        step="1"
      />
      <span id="contourWidthValue">0</span>
      <label for="contourCloseModeSelector">Close Mode:</label>
      <select id="contourCloseModeSelector">
        <option value="0">Close</option>
        <option value="1">Close CW</option>
        <option value="2">Close CCW</option>
      </select>
      <label
        ><input type="checkbox" id="contourAutoDetect" /> Auto-detect
        Orientation</label
      >
    </div>

    <div class="controls" id="gammaControls" style="display: none">
      <label for="gammaSlider">Gamma:</label>
      <input
        type="range"
        id="gammaSlider"
        min="0.5"
        max="3.0"
        value="1.0"
        step="0.05"
      />
      <span id="gammaValue">1.0</span>
      <label for="gammaThickSlider">Thickness:</label>
      <input
        type="range"
        id="gammaThickSlider"
        min="0.1"
        max="3.0"
        value="1.0"
        step="0.1"
      />
      <span id="gammaThickValue">1.0</span>
      <label for="gammaContrastSlider">Contrast:</label>
      <input
        type="range"
        id="gammaContrastSlider"
        min="0"
        max="1"
        value="1.0"
        step="0.05"
      />
      <span id="gammaContrastValue">1.0</span>
    </div>

    <div class="controls" id="lionoutlineControls" style="display: none">
      <label for="lionOutlineWidthSlider">Line Width:</label>
      <input
        type="range"
        id="lionOutlineWidthSlider"
        min="0.1"
        max="5.0"
        value="1.0"
        step="0.1"
      />
      <span id="lionOutlineWidthValue">1.0</span>
      <span style="font-size: 0.85rem; color: #86868b; margin-left: 0.5rem"
        >Left-drag: rotate &amp; scale &nbsp;|&nbsp; Right-drag: skew</span
      >
    </div>

    <div class="controls" id="roundedrectControls" style="display: none">
      <label for="rrRadiusSlider">Radius:</label>
      <input
        type="range"
        id="rrRadiusSlider"
        min="0"
        max="50"
        value="25"
        step="0.5"
      />
      <span id="rrRadiusValue">25.0</span>
      <label for="rrOffsetSlider" style="margin-left: 1rem"
        >Sub-pixel offset:</label
      >
      <input
        type="range"
        id="rrOffsetSlider"
        min="-2"
        max="3"
        value="0"
        step="0.1"
      />
      <span id="rrOffsetValue">0.0</span>
      <label style="margin-left: 1rem"
        ><input type="checkbox" id="rrDarkBg" /> White on black</label
      >
    </div>

    <div class="controls" id="componentControls" style="display: none">
      <label for="compAlphaSlider">Alpha:</label>
      <input
        type="range"
        id="compAlphaSlider"
        min="0"
        max="255"
        value="255"
        step="1"
      />
      <span id="compAlphaValue">255</span>
    </div>

    <div class="controls" id="perspectiveControls" style="display: none">
      <label for="perspectiveTypeSelector">Type:</label>
      <select id="perspectiveTypeSelector">
        <option value="0">Bilinear</option>
        <option value="1">Perspective</option>
      </select>
    </div>

    <div class="controls" id="transCurveControls" style="display: none">
      <label><input type="checkbox" id="transCurveAnimate" /> Animate</label>
    </div>

    <div class="controls" id="transCurve2Controls" style="display: none">
      <label><input type="checkbox" id="transCurve2Animate" /> Animate</label>
    </div>

    <canvas id="aggCanvas"></canvas>

    <div class="description" id="demoDesc"></div>
    <div class="status" id="statusMsg">Initializing...</div>

    <script src="wasm_exec.js"></script>
    <script src="main.js"></script>
  </body>
</html>
