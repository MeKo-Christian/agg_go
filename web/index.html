<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGG Go - Web Demo</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading">Loading WASM...</div>

    <div class="theme-container">
      <button class="theme-cycle-btn" id="themeCycle">
        <span id="themeIcon">🌓</span>
        <span class="theme-label" id="themeLabel">Auto</span>
      </button>
    </div>

    <h1>AGG Go Web Demo</h1>

    <div class="controls">
      <label for="demoSelector">Select Demo:</label>
      <select id="demoSelector">
        <optgroup label="── Showcase ──">
          <option value="agg2d">Agg2D API Demo</option>
          <option value="lion">Lion (AGG Signature)</option>
        </optgroup>
        <optgroup label="── Anti-Aliasing &amp; Gamma ──">
          <option value="aa">Anti-Aliasing Demo (Zoom)</option>
          <option value="aatest">AA Test (Sub-pixel Precision)</option>
          <option value="gamma">Gamma Correction</option>
          <option value="gamma_ctrl">Gamma Control (Interactive Spline)</option>
          <option value="gamma_tuner">Gamma Tuner (RGB Calibration)</option>
        </optgroup>
        <optgroup label="── Paths &amp; Strokes ──">
          <option value="conv_dash_marker">Conv Dash Marker</option>
          <option value="convstroke">Line Join &amp; Cap Styles</option>
          <option value="convcontour">
            Contour Tool &amp; Polygon Orientation
          </option>
          <option value="bezier_div">Bezier Subdivision</option>
          <option value="bspline">B-Spline Demo</option>
          <option value="sbool">Boolean Operations (XOR/Union)</option>
          <option value="roundedrect">Rounded Rectangle</option>
        </optgroup>
        <optgroup label="── Color &amp; Shading ──">
          <option value="gradients">Gradients Demo</option>
          <option value="gouraud">Gouraud Shading (Interpolation)</option>
          <option value="gouraud_mesh">Gouraud Mesh (Compound)</option>
          <option value="alphagrad">Alpha Channel Gradient</option>
          <option value="component">Component Rendering (CMY Mixing)</option>
          <option value="blend">Blend Modes Demo</option>
        </optgroup>
        <optgroup label="── Compositing &amp; Masking ──">
          <option value="compositing">Compositing Demo</option>
          <option value="alpha_mask">Alpha Mask Demo</option>
          <option value="alpha_mask2">Alpha Mask 2 (Lion)</option>
          <option value="multi_clip">Multi-Clip Demo</option>
        </optgroup>
        <optgroup label="── Transformations ──">
          <option value="perspective">Perspective Transformations</option>
          <option value="trans_curve">Along-a-Curve Transformer</option>
          <option value="trans_curve2">Double Path Transformer</option>
          <option value="trans_polar">Polar Transformations</option>
          <option value="distortions">Image Distortions</option>
          <option value="lionoutline">Lion Outline (Rotate/Scale/Skew)</option>
          <option value="lion_lens">Lion Lens (Magnifier)</option>
        </optgroup>
        <optgroup label="── Filters &amp; Rasterization ──">
          <option value="imagefilters">Image Interpolation Filters</option>
          <option value="blur">Gaussian &amp; Stack Blur</option>
          <option value="simple_blur">Simple 3×3 Blur</option>
          <option value="rasterizers">Aliased vs AA Rasterizer</option>
          <option value="flash_rasterizer">Flash (Compound) Rasterizer</option>
          <option value="circles">Random Circles (Scatter Plot)</option>
        </optgroup>
      </select>
      <button id="renderBtn">Refresh / Reset</button>
    </div>

    <div class="controls" id="alphaMask2Controls" style="display: none">
      <label for="am2EllipsesSlider">Ellipses:</label>
      <input
        type="range"
        id="am2EllipsesSlider"
        min="1"
        max="100"
        value="10"
        step="1"
      />
      <span id="am2EllipsesValue">10</span>
    </div>

    <div class="controls" id="compositingControls" style="display: none">
      <label for="compOpSelector">Operation:</label>
      <select id="compOpSelector">
        <option value="3">SrcOver</option>
        <option value="4">DstOver</option>
        <option value="5">SrcIn</option>
        <option value="6">DstIn</option>
        <option value="7">SrcOut</option>
        <option value="8">DstOut</option>
        <option value="9">SrcAtop</option>
        <option value="10">DstAtop</option>
        <option value="11">Xor</option>
        <option value="12">Plus</option>
        <option value="13">Multiply</option>
        <option value="14">Screen</option>
        <option value="15">Overlay</option>
        <option value="16">Darken</option>
        <option value="17">Lighten</option>
        <option value="18">ColorDodge</option>
        <option value="19">ColorBurn</option>
        <option value="20">HardLight</option>
        <option value="21">SoftLight</option>
        <option value="22">Difference</option>
        <option value="23">Exclusion</option>
      </select>
      <label for="compAlphaSrcSlider" style="margin-left: 1rem"
        >Alpha Src:</label
      >
      <input
        type="range"
        id="compAlphaSrcSlider"
        min="0"
        max="1"
        value="0.75"
        step="0.05"
      />
      <span id="compAlphaSrcValue">0.75</span>
      <label for="compAlphaDstSlider" style="margin-left: 1rem"
        >Alpha Dst:</label
      >
      <input
        type="range"
        id="compAlphaDstSlider"
        min="0"
        max="1"
        value="1.0"
        step="0.05"
      />
      <span id="compAlphaDstValue">1.0</span>
    </div>

    <div class="controls" id="multiClipControls" style="display: none">
      <label for="multiClipNSlider">N (Grid):</label>
      <input
        type="range"
        id="multiClipNSlider"
        min="1"
        max="10"
        value="3"
        step="1"
      />
      <span id="multiClipNValue">3</span>
    </div>

    <div class="controls" id="aaControls" style="display: none">
      <label for="zoomSlider">Pixel Size:</label>
      <input
        type="range"
        id="zoomSlider"
        min="8"
        max="64"
        value="32"
        step="1"
      />
      <span id="zoomValue">32</span>
    </div>

    <div class="controls" id="dashControls" style="display: none">
      <label for="dashWidthSlider">Width:</label>
      <input
        type="range"
        id="dashWidthSlider"
        min="0.5"
        max="10"
        value="3"
        step="0.5"
      />
      <span id="dashWidthValue">3</span>
      <label for="dashSmoothSlider" style="margin-left: 1rem">Smooth:</label>
      <input
        type="range"
        id="dashSmoothSlider"
        min="0"
        max="2"
        value="1"
        step="0.05"
      />
      <span id="dashSmoothValue">1.00</span>
      <label for="dashCapSelector" style="margin-left: 1rem">Cap:</label>
      <select id="dashCapSelector">
        <option value="0">Butt</option>
        <option value="1">Square</option>
        <option value="2">Round</option>
      </select>
      <label style="margin-left: 1rem"
        ><input type="checkbox" id="dashClosed" /> Close Polygons</label
      >
      <label style="margin-left: 0.5rem"
        ><input type="checkbox" id="dashEvenOdd" /> Even-Odd Fill</label
      >
    </div>

    <div class="controls" id="gouraudControls" style="display: none">
      <label for="dilationSlider">Dilation:</label>
      <input
        type="range"
        id="dilationSlider"
        min="-2"
        max="5"
        value="0.5"
        step="0.1"
      />
      <span id="dilationValue">0.5</span>
    </div>

    <div class="controls" id="gouraudMeshControls" style="display: none">
      <label for="meshColsSlider">Columns:</label>
      <input
        type="range"
        id="meshColsSlider"
        min="2"
        max="30"
        value="10"
        step="1"
      />
      <span id="meshColsValue">10</span>
      <label for="meshRowsSlider" style="margin-left: 1rem">Rows:</label>
      <input
        type="range"
        id="meshRowsSlider"
        min="2"
        max="30"
        value="10"
        step="1"
      />
      <span id="meshRowsValue">10</span>
    </div>

    <div class="controls" id="imageFilterControls" style="display: none">
      <label for="filterSelector">Filter:</label>
      <select id="filterSelector">
        <option value="0">Bilinear</option>
        <option value="1">Hanning</option>
        <option value="2">Hamming</option>
        <option value="3">Hermite</option>
        <option value="4">Quadric</option>
        <option value="5">Bicubic</option>
        <option value="6">Catrom</option>
        <option value="7">Mitchell</option>
        <option value="8">Spline16</option>
        <option value="9">Spline36</option>
        <option value="10">Gaussian</option>
        <option value="11">Bessel</option>
        <option value="12">Sinc</option>
        <option value="13">Lanczos</option>
        <option value="14">Blackman</option>
      </select>
      <label for="filterRadiusSlider" id="radiusLabel" style="display: none"
        >Radius:</label
      >
      <input
        type="range"
        id="filterRadiusSlider"
        min="2"
        max="8"
        value="4"
        step="0.1"
        style="display: none"
      />
      <span id="filterRadiusValue" style="display: none">4</span>
    </div>

    <div class="controls" id="sboolControls" style="display: none">
      <label for="sboolOpSelector">Operation:</label>
      <select id="sboolOpSelector">
        <option value="0">Union (Non-Zero)</option>
        <option value="2">XOR (Even-Odd)</option>
      </select>
    </div>

    <div class="controls" id="convstrokeControls" style="display: none">
      <label for="strokeJoinSelector">Join:</label>
      <select id="strokeJoinSelector">
        <option value="0">Miter</option>
        <option value="1">Round</option>
        <option value="2">Bevel</option>
      </select>
      <label for="strokeCapSelector">Cap:</label>
      <select id="strokeCapSelector">
        <option value="0">Butt</option>
        <option value="1">Square</option>
        <option value="2">Round</option>
      </select>
      <label for="strokeWidthSlider">Width:</label>
      <input
        type="range"
        id="strokeWidthSlider"
        min="3"
        max="40"
        value="20"
        step="1"
      />
      <span id="strokeWidthValue">20</span>
      <label for="strokeMiterSlider">Miter Limit:</label>
      <input
        type="range"
        id="strokeMiterSlider"
        min="1"
        max="10"
        value="4"
        step="0.5"
      />
      <span id="strokeMiterValue">4</span>
    </div>

    <div class="controls" id="convcontourControls" style="display: none">
      <label for="contourWidthSlider">Width:</label>
      <input
        type="range"
        id="contourWidthSlider"
        min="-60"
        max="60"
        value="0"
        step="1"
      />
      <span id="contourWidthValue">0</span>
      <label for="contourCloseModeSelector">Close Mode:</label>
      <select id="contourCloseModeSelector">
        <option value="0">Close</option>
        <option value="1">Close CW</option>
        <option value="2">Close CCW</option>
      </select>
      <label
        ><input type="checkbox" id="contourAutoDetect" /> Auto-detect
        Orientation</label
      >
    </div>

    <div class="controls" id="gammaControls" style="display: none">
      <label for="gammaSlider">Gamma:</label>
      <input
        type="range"
        id="gammaSlider"
        min="0.5"
        max="3.0"
        value="1.0"
        step="0.05"
      />
      <span id="gammaValue">1.0</span>
      <label for="gammaThickSlider">Thickness:</label>
      <input
        type="range"
        id="gammaThickSlider"
        min="0.1"
        max="3.0"
        value="1.0"
        step="0.1"
      />
      <span id="gammaThickValue">1.0</span>
      <label for="gammaContrastSlider">Contrast:</label>
      <input
        type="range"
        id="gammaContrastSlider"
        min="0"
        max="1"
        value="1.0"
        step="0.05"
      />
      <span id="gammaContrastValue">1.0</span>
    </div>

    <div class="controls" id="lionLensControls" style="display: none">
      <label for="lionLensScaleSlider">Scale:</label>
      <input
        type="range"
        id="lionLensScaleSlider"
        min="0.01"
        max="4.0"
        value="3.0"
        step="0.01"
      />
      <span id="lionLensScaleValue">3.00</span>
      <label for="lionLensRadiusSlider" style="margin-left: 1rem">Radius:</label>
      <input
        type="range"
        id="lionLensRadiusSlider"
        min="0"
        max="100"
        value="70"
        step="1"
      />
      <span id="lionLensRadiusValue">70</span>
      <span style="font-size: 0.85rem; color: #86868b; margin-left: 0.5rem"
        >Drag to move lens</span
      >
    </div>

    <div class="controls" id="lionoutlineControls" style="display: none">
      <label for="lionOutlineWidthSlider">Line Width:</label>
      <input
        type="range"
        id="lionOutlineWidthSlider"
        min="0.1"
        max="5.0"
        value="1.0"
        step="0.1"
      />
      <span id="lionOutlineWidthValue">1.0</span>
      <span style="font-size: 0.85rem; color: #86868b; margin-left: 0.5rem"
        >Left-drag: rotate &amp; scale &nbsp;|&nbsp; Right-drag: skew</span
      >
    </div>

    <div class="controls" id="roundedrectControls" style="display: none">
      <label for="rrRadiusSlider">Radius:</label>
      <input
        type="range"
        id="rrRadiusSlider"
        min="0"
        max="50"
        value="25"
        step="0.5"
      />
      <span id="rrRadiusValue">25.0</span>
      <label for="rrOffsetSlider" style="margin-left: 1rem"
        >Sub-pixel offset:</label
      >
      <input
        type="range"
        id="rrOffsetSlider"
        min="-2"
        max="3"
        value="0"
        step="0.1"
      />
      <span id="rrOffsetValue">0.0</span>
      <label style="margin-left: 1rem"
        ><input type="checkbox" id="rrDarkBg" /> White on black</label
      >
    </div>

    <div class="controls" id="componentControls" style="display: none">
      <label for="compAlphaSlider">Alpha:</label>
      <input
        type="range"
        id="compAlphaSlider"
        min="0"
        max="255"
        value="255"
        step="1"
      />
      <span id="compAlphaValue">255</span>
    </div>

    <div class="controls" id="perspectiveControls" style="display: none">
      <label for="perspectiveTypeSelector">Type:</label>
      <select id="perspectiveTypeSelector">
        <option value="0">Bilinear</option>
        <option value="1">Perspective</option>
      </select>
    </div>

    <div class="controls" id="transCurveControls" style="display: none">
      <label><input type="checkbox" id="transCurveAnimate" /> Animate</label>
    </div>

    <div class="controls" id="transCurve2Controls" style="display: none">
      <label><input type="checkbox" id="transCurve2Animate" /> Animate</label>
    </div>

    <div class="controls" id="blurControls" style="display: none">
      <label for="blurRadiusSlider">Radius:</label>
      <input
        type="range"
        id="blurRadiusSlider"
        min="0"
        max="40"
        value="15"
        step="1"
      />
      <span id="blurRadiusValue">15</span>
      <label for="blurMethodSelector" style="margin-left: 1rem">Method:</label>
      <select id="blurMethodSelector">
        <option value="0">Stack Blur (Fast)</option>
        <option value="1">Recursive Blur (High Quality)</option>
      </select>
    </div>

    <div class="controls" id="circlesControls" style="display: none">
      <label for="circlesSelectivitySlider">Selectivity:</label>
      <input
        type="range"
        id="circlesSelectivitySlider"
        min="0.01"
        max="0.5"
        value="0.1"
        step="0.01"
      />
      <span id="circlesSelectivityValue">0.10</span>
      <label for="circlesSizeSlider" style="margin-left: 1rem">Size:</label>
      <input
        type="range"
        id="circlesSizeSlider"
        min="0.1"
        max="2.0"
        value="0.5"
        step="0.1"
      />
      <span id="circlesSizeValue">0.5</span>
      <label for="circlesZLowSlider" style="margin-left: 1rem">Z Min:</label>
      <input
        type="range"
        id="circlesZLowSlider"
        min="0"
        max="1"
        value="0.2"
        step="0.01"
      />
      <span id="circlesZLowValue">0.20</span>
      <label for="circlesZHighSlider" style="margin-left: 1rem">Z Max:</label>
      <input
        type="range"
        id="circlesZHighSlider"
        min="0"
        max="1"
        value="0.8"
        step="0.01"
      />
      <span id="circlesZHighValue">0.80</span>
    </div>

    <canvas id="aggCanvas"></canvas>

    <div class="description" id="demoDesc"></div>
    <div class="status" id="statusMsg">Initializing...</div>

    <script src="wasm_exec.js"></script>
    <script src="main.js"></script>
  </body>
</html>
